{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-8 col-md-5 col-lg-4">
    <div class="card p-4">
      <h4 class="mb-2 text-center"><i class="bi bi-key text-primary"></i> Forgot Password</h4>
      <p class="text-muted small text-center mb-4">Enter your email and we'll send you a reset link.</p>
      <form method="POST">
        <div class="mb-4">
          <label class="form-label">Email address</label>
          <input type="email" name="email" class="form-control" required autofocus>
        </div>
        <button class="btn btn-primary w-100">Send Reset Link</button>
      </form>
      <p class="text-center mt-3 mb-0 text-muted small">
        <a href="{{ url_for('login') }}">Back to log in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
