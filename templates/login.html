{% extends "base.html" %}
{% block title %}Log In{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-8 col-md-5 col-lg-4">
    <div class="card p-4">
      <h4 class="mb-4 text-center"><i class="bi bi-people text-primary"></i> Mini CRM</h4>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button class="btn btn-primary w-100">Log In</button>
      </form>
      <div class="text-center mt-3">
        <a href="{{ url_for('forgot_password') }}" class="text-muted small">Forgot your password?</a>
      </div>
      <p class="text-center mt-2 mb-0 text-muted small">
        Don't have an account? <a href="{{ url_for('register') }}">Sign up</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
